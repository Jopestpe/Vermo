<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="vermo.png">
  <title>Vermo</title>
  <link rel="stylesheet" href="estilo.css">
  <script type="module" src="acoes_modulo.js" defer></script>
  <script src="entrada_numerica.js" defer></script>
</head>
<body>
  <div id="barra">
    <button id="botao_importar">Importar</button>
    <input  id="entrada_cor_sol" type="color">
    <button id="botao_cor_sol" type="color"></button>
    x <entrada-numerica id="rotacao_x" value="-135" min="-360" max="360" step="1"></entrada-numerica>
    y <entrada-numerica id="rotacao_y" value="0" min="-360" max="360" step="1"></entrada-numerica>
    z <entrada-numerica id="rotacao_z" value="0" min="-360" max="360" step="1"></entrada-numerica>
    i <entrada-numerica id="intensidade" value="15000" min="0" max="200000" step="1000"></entrada-numerica>
    e <entrada-numerica id="escala" value="1" min="0" max="1000" step="0.1"></entrada-numerica>
  </div>
</body>
</html>
