<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="vermo.png">
  </meta>
  <title>Vermo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <script type="module">
    import init, { bevy_arquivo_recebido } from './vermo.js';

    await init();

    window.abrir_seletor_arquivo = function() {
      const seletor = document.createElement('input');
      seletor.type = 'file';
      seletor.accept = '.glb,.gltf';
      seletor.onchange = async (evento) => {
        const arquivo = evento.target.files[0];
        if (!arquivo) return;
        const buffer = await arquivo.arrayBuffer();
        bevy_arquivo_recebido(new Uint8Array(buffer));
      };
      seletor.click();
    };
  </script>
</body>
</html>
